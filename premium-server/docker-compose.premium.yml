# @author Tang Chee Seng
# Premium user-only agent service - set up on a local server (PC)

services:
  ollama:
    image: ollama/ollama:latest
    environment:
      OLLAMA_KEEP_ALIVE: "-1"
    volumes:
      - ollama-data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
        limits:
          memory: 9g
    restart: unless-stopped
  premium-agent:
    build:
      context: ./premium-agent
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_GENERATION_MODEL: ${OLLAMA_GENERATION_MODEL:-gemma4:e4b}
      AI_INTERNAL_SECRET: ${AI_INTERNAL_SECRET:?Set AI_INTERNAL_SECRET in .env.premium}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-true}

      LANGSMITH_API_KEY_PREMIUM_AGENT: ${LANGSMITH_API_KEY_PREMIUM_AGENT:-}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-WeatherAgent}
      LANGSMITH_ENDPOINT: ${LANGSMITH_ENDPOINT:-https://api.smith.langchain.com}

    ports:
      - "127.0.0.1:8002:8000"
    depends_on:
      - ollama
    deploy:
      resources:
        limits:
          memory: 8g
    restart: unless-stopped
volumes:
  ollama-data: