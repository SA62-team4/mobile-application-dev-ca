# @author Tang Chee Seng
# Premium user-only agent service - set up on a local server (PC)

services:
  ollama:
    image: ollama/ollama:latest
    ports:
      # to replace with SSH reverse tunnel details
      # - "${TAILSCALE_IP:?Set TAILSCALE_IP in .env.premium}:11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
        limits:
          memory: 9g
    restart: unless-stopped
  premium-agent:
    build:
      context: ./premium-agent
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_GENERATION_MODEL: ${OLLAMA_GENERATION_MODEL:-gemma4:e4b}
      AI_INTERNAL_SECRET: ${AI_INTERNAL_SECRET:?Set AI_INTERNAL_SECRET in .env.premium}
    ports:
      # to replace with SSH reverse tunnel details
      # - "${TAILSCALE_IP:?Set TAILSCALE_IP in .env.premium}:8000:8000"
    depends_on:
      - ollama
    deploy:
      resources:
        limits:
          memory: 8g
    restart: unless-stopped
volumes:
  ollama-data: