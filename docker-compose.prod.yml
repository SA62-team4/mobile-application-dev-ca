# Production overlay:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# Uses GHCR images, Caddy-only public ports, and enforced memory caps.

services:

  # Use enforced memory caps.
  mysql:
    ports: !reset [] # internal only
    deploy: !reset null
    mem_limit: 512m

  ollama:
    ports: !reset []
    deploy: !reset null
    mem_limit: 4608m # llama3.2:1b + nomic-embed-text
    environment:
      # Keep model weights resident.
      OLLAMA_KEEP_ALIVE: "-1"
      # Prefer single-answer latency.
      OLLAMA_NUM_PARALLEL: "1"
      # Keep generation and embedding models loaded.
      OLLAMA_MAX_LOADED_MODELS: "2"

  python-ai-service:
    image: ${PYTHON_IMAGE:-ghcr.io/sa62-team4/wellness-python-ai-service:latest}
    build: !reset null
    ports: !reset []
    deploy: !reset null
    mem_limit: 768m

  spring-backend:
    image: ${SPRING_IMAGE:-ghcr.io/sa62-team4/wellness-spring-backend:latest}
    build: !reset null
    ports: !reset []
    deploy: !reset null
    mem_limit: 512m

  adminer:
    profiles: ["debug"] # not started in prod

  # Public HTTPS edge.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      API_DOMAIN: ${API_DOMAIN:?set API_DOMAIN in .env}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data   # cert storage
      - caddy-config:/config
    networks:
      - wellness-net
    depends_on:
      spring-backend:
        condition: service_healthy

volumes:
  caddy-data:
  caddy-config:
