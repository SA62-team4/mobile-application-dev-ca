services:
  dotnet-backend:
    build: ./dotnet-backend
    environment:
      ASPNETCORE_URLS: http://+:8080
      DOTNET_CONNECTION_STRING: Server=mysql;Port=3306;Database=${MYSQL_DATABASE:-wellness_app};User=${MYSQL_USER:-wellness_user};Password=${MYSQL_PASSWORD:-change_me};TreatTinyAsBoolean=true;
      JWT_SECRET: ${JWT_SECRET:-replace_with_a_long_random_secret_at_least_32_chars}
      JWT_EXPIRY_SECONDS: ${JWT_EXPIRY_SECONDS:-86400}
      AI_SERVICE_URL: http://python-ai-service:8000
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-replace_with_internal_token}
    ports:
      - "${DOTNET_BACKEND_HOST_PORT:-8082}:8080"
    depends_on:
      mysql:
        condition: service_healthy

  python-ai-service:
    environment:
      BACKEND_BASE_URL: http://dotnet-backend:8080
    depends_on:
      dotnet-backend:
        condition: service_started
