services:
  sonar-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${SONAR_POSTGRES_DB:-sonarqube}
      POSTGRES_USER: ${SONAR_POSTGRES_USER:-sonarqube}
      POSTGRES_PASSWORD: ${SONAR_POSTGRES_PASSWORD:?Set SONAR_POSTGRES_PASSWORD in .env.sonar}
    volumes:
      - sonar-postgres-data:/var/lib/postgresql/data
    networks:
      - sonar-net

  sonarqube:
    image: sonarqube:community
    restart: unless-stopped
    depends_on:
      - sonar-db
    ulimits:
      nofile:
        soft: 131072
        hard: 131072
      nproc: 8192
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-db:5432/${SONAR_POSTGRES_DB:-sonarqube}
      SONAR_JDBC_USERNAME: ${SONAR_POSTGRES_USER:-sonarqube}
      SONAR_JDBC_PASSWORD: ${SONAR_POSTGRES_PASSWORD:?Set SONAR_POSTGRES_PASSWORD in .env.sonar}
    volumes:
      - sonarqube-data:/opt/sonarqube/data
      - sonarqube-extensions:/opt/sonarqube/extensions
      - sonarqube-logs:/opt/sonarqube/logs
    networks:
      - sonar-net

  sonar-caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - sonarqube
    ports:
      - "80:80"
      - "443:443"
    environment:
      SONAR_DOMAIN: ${SONAR_DOMAIN:?Set SONAR_DOMAIN in .env.sonar}
    volumes:
      - ./Caddyfile.sonar:/etc/caddy/Caddyfile:ro
      - sonar-caddy-data:/data
      - sonar-caddy-config:/config
    networks:
      - sonar-net

networks:
  sonar-net:

volumes:
  sonar-postgres-data:
  sonarqube-data:
  sonarqube-extensions:
  sonarqube-logs:
  sonar-caddy-data:
  sonar-caddy-config:
