server:
  port: 8080

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:wellness_app;MODE=MySQL;DATABASE_TO_LOWER=TRUE}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    default-property-inclusion: non_null

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  jwt:
    secret: ${JWT_SECRET:dev_secret_replace_with_very_long_random_value}
    expiry-seconds: ${JWT_EXPIRY_SECONDS:86400}
  ai-service-url: ${AI_SERVICE_URL:http://localhost:8000}
  premium-ai-url: ${PREMIUM_AI_URL:}        # empty ⇒ premium disabled (safe default)
  premium-ai-secret: ${PREMIUM_AI_SECRET:}
  internal-service-token: ${INTERNAL_SERVICE_TOKEN:dev_internal_token}
  google:
    # OAuth Web client ID for Android ID token validation.
    client-id: ${GOOGLE_CLIENT_ID:554077955234-cvbtaidiru0t7ppu4lht6tt9gmgddu09.apps.googleusercontent.com}
