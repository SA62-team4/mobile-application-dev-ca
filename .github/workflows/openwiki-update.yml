name: OpenWiki Update

on:
  workflow_dispatch:
  schedule:
    - cron: "0 16 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          # Full history so OpenWiki can diff against the gitHead recorded in
          # .last-update.json; a shallow clone hides it and yields no updates.
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install OpenWiki
        run: npm install --global openwiki

      - name: Run OpenWiki
        run: openwiki --update --print
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENWIKI_MODEL_ID: z-ai/glm-5.2
          # LangSmith tracing disabled: the tracer emits harmless but noisy
          # "No LLM/tool run to end" callback-mismatch errors. Re-enable by
          # restoring these vars and setting LANGCHAIN_TRACING_V2 to "true".
          LANGCHAIN_TRACING_V2: "false"

      - name: Create OpenWiki update pull request
        uses: peter-evans/create-pull-request@v8
        with:
          add-paths: openwiki
          branch: openwiki/update
          commit-message: "docs: update OpenWiki"
          title: "docs: update OpenWiki"
          body: |
            Automated OpenWiki documentation update.

            This PR was generated by the scheduled OpenWiki workflow.