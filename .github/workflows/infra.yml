name: Infra (Terraform)

# Manual provisioning of DigitalOcean infra. Run plan first, then apply.
on:
  workflow_dispatch:
    inputs:
      action:
        description: Terraform action
        type: choice
        options: [plan, apply, destroy]
        default: plan

permissions:
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    environment: production # approval gate for apply/destroy
    env:
      DIGITALOCEAN_TOKEN: ${{ secrets.DIGITALOCEAN_TOKEN }}
      # DO Spaces creds for the S3 remote state backend.
      AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_KEY }}
      ACTION: ${{ inputs.action }}
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
      TF_STATE_ENDPOINT: ${{ vars.TF_STATE_ENDPOINT }}
      DO_REGION: ${{ vars.DO_REGION }}
      DROPLET_SIZE: ${{ vars.DROPLET_SIZE }}
      SONAR_DROPLET_SIZE: ${{ vars.SONAR_DROPLET_SIZE }}
      SSH_KEY_NAME: ${{ vars.SSH_KEY_NAME }}
      MANAGE_DNS: ${{ vars.MANAGE_DNS }}
      DOMAIN: ${{ vars.DOMAIN }}
      SUBDOMAIN: ${{ vars.SUBDOMAIN }}
      SONAR_SUBDOMAIN: ${{ vars.SONAR_SUBDOMAIN }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Check Terraform formatting
        run: terraform -chdir=infra/terraform fmt -check -diff

      - name: Render backend + tfvars
        run: |
          : "${SONAR_DROPLET_SIZE:=s-2vcpu-4gb}"
          : "${SONAR_SUBDOMAIN:=sonar}"
          TF_DIR="infra/terraform"
          cat > "$TF_DIR/terraform.tfvars" <<EOF
          region              = "$DO_REGION"
          droplet_size        = "$DROPLET_SIZE"
          sonar_droplet_size = "$SONAR_DROPLET_SIZE"
          ssh_key_name        = "$SSH_KEY_NAME"
          manage_dns          = $MANAGE_DNS
          domain              = "$DOMAIN"
          subdomain           = "$SUBDOMAIN"
          sonar_subdomain     = "$SONAR_SUBDOMAIN"
          EOF

          cat > "$TF_DIR/backend.hcl" <<EOF
          bucket    = "$TF_STATE_BUCKET"
          key       = "wellness/terraform.tfstate"
          endpoints = { s3 = "$TF_STATE_ENDPOINT" }
          EOF

          terraform -chdir="$TF_DIR" fmt terraform.tfvars backend.hcl

          echo "TF_DIR=$TF_DIR" >> "$GITHUB_ENV"

      - run: terraform -chdir="$TF_DIR" init -backend-config=backend.hcl

      - run: terraform -chdir="$TF_DIR" validate

      - name: Terraform ${{ inputs.action }}
        run: |
          if [ "$ACTION" = "plan" ]; then
            terraform -chdir="$TF_DIR" plan
          else
            terraform -chdir="$TF_DIR" "$ACTION" -auto-approve
          fi

      - name: Show outputs
        if: ${{ inputs.action != 'destroy' }}
        run: terraform -chdir="$TF_DIR" output
