name: Deploy

# Build images, push to GHCR, then deploy the prod stack to the droplet.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_PREFIX: ghcr.io/sa62-team4

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push spring-backend
        uses: docker/build-push-action@v6
        with:
          context: ./spring-backend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/wellness-spring-backend:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/wellness-spring-backend:latest

      - name: Build & push python-ai-service
        uses: docker/build-push-action@v6
        with:
          context: ./python-ai-service
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/wellness-python-ai-service:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/wellness-python-ai-service:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production # approval gate
    steps:
      - uses: actions/checkout@v4

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Render .env
        env:
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          INTERNAL_SERVICE_TOKEN: ${{ secrets.INTERNAL_SERVICE_TOKEN }}
          API_DOMAIN: ${{ vars.API_DOMAIN }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cat > deploy.env <<EOF
          MYSQL_PASSWORD=$MYSQL_PASSWORD
          MYSQL_ROOT_PASSWORD=$MYSQL_ROOT_PASSWORD
          SPRING_DATASOURCE_PASSWORD=$SPRING_DATASOURCE_PASSWORD
          JWT_SECRET=$JWT_SECRET
          INTERNAL_SERVICE_TOKEN=$INTERNAL_SERVICE_TOKEN
          API_DOMAIN=$API_DOMAIN
          SPRING_IMAGE=$IMAGE_PREFIX/wellness-spring-backend:$IMAGE_TAG
          PYTHON_IMAGE=$IMAGE_PREFIX/wellness-python-ai-service:$IMAGE_TAG
          EOF

      - name: Ship files to droplet
        env:
          HOST: ${{ secrets.DROPLET_HOST }}
          SSH_OPTS: -o StrictHostKeyChecking=accept-new
        run: |
          rsync -az -e "ssh $SSH_OPTS" \
            docker-compose.yml docker-compose.prod.yml Caddyfile \
            "deploy@$HOST:/opt/wellness/"
          rsync -az --delete -e "ssh $SSH_OPTS" \
            rag-knowledge-base "deploy@$HOST:/opt/wellness/"
          rsync -az -e "ssh $SSH_OPTS" deploy.env "deploy@$HOST:/opt/wellness/.env"

      - name: Deploy on droplet
        env:
          HOST: ${{ secrets.DROPLET_HOST }}
          GHCR_USER: ${{ github.actor }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        run: |
          ssh -o StrictHostKeyChecking=accept-new "deploy@$HOST" bash -s <<EOF
          set -euo pipefail
          echo "$GHCR_PAT" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
          cd /opt/wellness
          export COMPOSE="docker compose -f docker-compose.yml -f docker-compose.prod.yml"
          \$COMPOSE pull
          \$COMPOSE up -d --remove-orphans
          # Ensure Ollama models are present (first deploy pulls ~2.5 GB).
          sleep 10
          \$COMPOSE exec -T ollama sh -c 'ollama list | grep -q llama3.2 || ollama pull llama3.2:3b'
          \$COMPOSE exec -T ollama sh -c 'ollama list | grep -q nomic-embed-text || ollama pull nomic-embed-text'
          docker logout ghcr.io
          EOF

      - name: Health check
        env:
          API_DOMAIN: ${{ vars.API_DOMAIN }}
        run: |
          for i in $(seq 1 20); do
            if curl -fsS "https://$API_DOMAIN/actuator/health" | grep -q '"status":"UP"'; then
              echo "Healthy"; exit 0
            fi
            echo "Waiting for health ($i)..."; sleep 15
          done
          echo "Service did not become healthy in time"; exit 1
