name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install PlantUML
        run: |
          sudo apt-get update
          sudo apt-get install -y plantuml graphviz
      - name: Validate PlantUML diagrams
        run: plantuml -checkonly docs/specs/*.md

  backend:
    runs-on: ubuntu-latest
    env:
      SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Test Spring Boot backend
        working-directory: spring-backend
        run: mvn -B verify
      - name: Scan Spring Boot backend with SonarQube
        if: ${{ env.SONAR_HOST_URL != '' && env.SONAR_TOKEN != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        working-directory: spring-backend
        run: >
          mvn -B org.sonarsource.scanner.maven:sonar-maven-plugin:sonar
          -Dsonar.host.url="$SONAR_HOST_URL"
          -Dsonar.token="$SONAR_TOKEN"
          -Dsonar.projectKey=sa62-wellness-spring-backend
          -Dsonar.projectName="SA62 Wellness Spring Backend"

  android:
    runs-on: ubuntu-latest
    env:
      SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - name: Build and test Android app
        working-directory: android-app
        run: ./gradlew --gradle-user-home ../.gradle-cache :app:assembleDebug :app:testDebugUnitTest
      - name: Generate Android lint report for SonarQube
        continue-on-error: true
        working-directory: android-app
        run: ./gradlew --gradle-user-home ../.gradle-cache :app:lintDebug
      - name: Scan Android app with SonarQube
        if: ${{ env.SONAR_HOST_URL != '' && env.SONAR_TOKEN != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        env:
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
        with:
          projectBaseDir: android-app

  dotnet-backend:
    runs-on: ubuntu-latest
    env:
      SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: "10.0.x"
      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        if: ${{ env.SONAR_HOST_URL != '' && env.SONAR_TOKEN != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        with:
          distribution: temurin
          java-version: "17"
      - name: Restore .NET backup backend tests
        run: dotnet restore dotnet-backend/tests/Wellness.Backup.Api.Tests/Wellness.Backup.Api.Tests.csproj
      - name: Install SonarScanner for .NET
        if: ${{ env.SONAR_HOST_URL != '' && env.SONAR_TOKEN != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        run: |
          dotnet tool install --global dotnet-sonarscanner
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"
      - name: Begin .NET backup backend SonarQube scan
        if: ${{ env.SONAR_HOST_URL != '' && env.SONAR_TOKEN != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        run: >
          dotnet sonarscanner begin
          /k:"sa62-wellness-dotnet-backend"
          /n:"SA62 Wellness .NET Backup Backend"
          /d:sonar.host.url="$SONAR_HOST_URL"
          /d:sonar.token="$SONAR_TOKEN"
      - name: Test .NET backup backend
        run: dotnet test dotnet-backend/tests/Wellness.Backup.Api.Tests/Wellness.Backup.Api.Tests.csproj --no-restore
      - name: End .NET backup backend SonarQube scan
        if: ${{ env.SONAR_HOST_URL != '' && env.SONAR_TOKEN != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        run: dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"

  python:
    runs-on: ubuntu-latest
    env:
      SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Compile Python service
        working-directory: python-ai-service
        run: python -m compileall app
      - name: Install Python test dependencies
        working-directory: python-ai-service
        run: pip install -r requirements-dev.txt
      - name: Run RAG indexing + retrieval smoke tests
        working-directory: python-ai-service
        # Excludes the opt-in live Ollama integration tests (marked "integration").
        run: pytest -m "not integration" -q
      - name: Scan Python AI service with SonarQube
        if: ${{ env.SONAR_HOST_URL != '' && env.SONAR_TOKEN != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        env:
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
        with:
          projectBaseDir: python-ai-service

  desktop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: "10.0.x"
      - name: Build and test .NET desktop client
        working-directory: desktop-app
        run: |
          dotnet build WellnessDesktop.sln
          dotnet test WellnessDesktop.sln --no-build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Validate Compose file
        run: docker compose config
      - name: Validate .NET backup Compose override
        run: docker compose -f docker-compose.yml -f docker-compose.dotnet-backup.yml config
      - name: Validate SonarQube Compose file
        env:
          SONAR_DOMAIN: sonar.example.com
          SONAR_POSTGRES_PASSWORD: example_only_for_compose_validation
        run: docker compose -f docker-compose.sonar.yml config

  ansible:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install Ansible
        run: pip install ansible ansible-lint
      - name: Install collections
        run: ansible-galaxy collection install -r infra/ansible/requirements.yml
      - name: Syntax check
        working-directory: infra/ansible
        run: ansible-playbook site.yml --syntax-check
      - name: Lint playbooks
        working-directory: infra/ansible
        run: ansible-lint

  # Keep committed lockfiles in sync so Semgrep Supply Chain (Managed Scans) can resolve deps.
  # Skipped on Dependabot's own runs: the dependabot-lockfiles workflow regenerates and pushes
  # the lockfiles, and that PAT push re-triggers this job as a normal actor to verify them.
  lockfiles:
    name: Verify supply chain lockfiles
    if: ${{ github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: "17"
      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: "10.0.x"
      - uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Regenerate Maven dependency tree
        working-directory: spring-backend
        run: mvn -B dependency:tree -DoutputType=text -DoutputFile=maven_dep_tree.txt
      - name: Check maven_dep_tree.txt in sync
        run: git diff --exit-code spring-backend/maven_dep_tree.txt

      - name: Regenerate Gradle lockfile
        working-directory: android-app
        run: ./gradlew :app:dependencies --write-locks
      - name: Check gradle.lockfile in sync
        run: git diff --exit-code android-app/app/gradle.lockfile

      - name: Verify .NET lockfiles (locked restore)
        run: |
          for proj in dotnet-backend/Wellness.Backup.Api.csproj \
                      dotnet-backend/tests/Wellness.Backup.Api.Tests/Wellness.Backup.Api.Tests.csproj \
                      desktop-app/src/WellnessDesktop/WellnessDesktop.csproj \
                      desktop-app/tests/WellnessDesktop.Tests/WellnessDesktop.Tests.csproj; do
            dotnet restore "$proj" --locked-mode
          done
