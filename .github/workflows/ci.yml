name: CI

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install PlantUML
        run: |
          sudo apt-get update
          sudo apt-get install -y plantuml graphviz
      - name: Validate PlantUML diagrams
        run: plantuml -checkonly docs/specs/*.md

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Test Spring Boot backend
        working-directory: spring-backend
        run: mvn test

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
      - name: Build Android debug APK
        working-directory: android-app
        run: ./gradlew --gradle-user-home ../.gradle-cache :app:assembleDebug

  dotnet-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Restore .NET backup backend tests
        run: dotnet restore dotnet-backend/tests/Wellness.Backup.Api.Tests/Wellness.Backup.Api.Tests.csproj
      - name: Test .NET backup backend
        run: dotnet test dotnet-backend/tests/Wellness.Backup.Api.Tests/Wellness.Backup.Api.Tests.csproj --no-restore

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile Python service
        working-directory: python-ai-service
        run: python -m compileall app

  desktop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Build and test .NET desktop client
        working-directory: desktop-app
        run: |
          dotnet build WellnessDesktop.sln
          dotnet test WellnessDesktop.sln --no-build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Compose file
        run: docker compose config
      - name: Validate .NET backup Compose override
        run: docker compose -f docker-compose.yml -f docker-compose.dotnet-backup.yml config

  ansible:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Ansible
        run: pip install ansible ansible-lint
      - name: Install collections
        run: ansible-galaxy collection install -r infra/ansible/requirements.yml
      - name: Syntax check
        working-directory: infra/ansible
        run: ansible-playbook site.yml --syntax-check
      - name: Lint playbooks
        working-directory: infra/ansible
        run: ansible-lint
