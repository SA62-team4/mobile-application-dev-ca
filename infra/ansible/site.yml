# @author Tiong Zhong Cheng
---
# Configure the droplet and deploy the wellness stack.
# Run bootstrap + app together (default), or a subset with --tags.
#
#   ansible-playbook site.yml                 # full run
#   ansible-playbook site.yml --tags app      # redeploy app only
#   ansible-playbook site.yml --limit sonar   # deploy SonarQube only
#   ansible-playbook site.yml --tags bootstrap
- name: Deploy wellness stack
  hosts: wellness
  become: true
  gather_facts: true

  vars:
    # Repo root relative to this playbook, so roles can copy compose/Caddy files
    # and the knowledge base from the checked-out repository.
    repo_root: "{{ playbook_dir }}/../.."
    app_dir: /opt/wellness

    # Secrets are read from the environment (not CLI extra-vars) so they never
    # appear in the process argv. The deploy workflow exports them from the
    # production GitHub Environment secrets.
    ghcr_user: "{{ lookup('env', 'GHCR_USER') }}"
    ghcr_pat: "{{ lookup('env', 'GHCR_PAT') }}"
    mysql_password: "{{ lookup('env', 'MYSQL_PASSWORD') }}"
    mysql_root_password: "{{ lookup('env', 'MYSQL_ROOT_PASSWORD') }}"
    spring_datasource_password: "{{ lookup('env', 'SPRING_DATASOURCE_PASSWORD') }}"
    jwt_secret: "{{ lookup('env', 'JWT_SECRET') }}"
    internal_service_token: "{{ lookup('env', 'INTERNAL_SERVICE_TOKEN') }}"

    # LangSmith tracing (optional). Stays off unless LANGSMITH_TRACING=true and an
    # API key are supplied, so a missing secret never breaks the deploy.
    langsmith_tracing: "{{ lookup('env', 'LANGSMITH_TRACING') | default('false', true) }}"
    langsmith_api_key: "{{ lookup('env', 'LANGSMITH_API_KEY') | default('', true) }}"
    langsmith_project: "{{ lookup('env', 'LANGSMITH_PROJECT') | default('wellness-agentic-ai', true) }}"
    langsmith_endpoint: "{{ lookup('env', 'LANGSMITH_ENDPOINT') | default('https://api.smith.langchain.com', true) }}"

  roles:
    - role: bootstrap
      tags: [bootstrap]
    - role: app
      tags: [app]

- name: Deploy SonarQube Community Build
  hosts: sonar
  become: true
  gather_facts: true

  vars:
    repo_root: "{{ playbook_dir }}/../.."
    app_dir: /opt/sonarqube

    sonar_domain: "{{ lookup('env', 'SONAR_DOMAIN') }}"
    sonar_postgres_db: "{{ lookup('env', 'SONAR_POSTGRES_DB') | default('sonarqube', true) }}"
    sonar_postgres_user: "{{ lookup('env', 'SONAR_POSTGRES_USER') | default('sonarqube', true) }}"
    sonar_postgres_password: "{{ lookup('env', 'SONAR_POSTGRES_PASSWORD') }}"

  roles:
    - role: bootstrap
      tags: [bootstrap]
    - role: sonarqube
      tags: [sonarqube]
