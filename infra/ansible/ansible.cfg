[defaults]
inventory = inventory.yml
roles_path = roles
host_key_checking = False
retry_files_enabled = False
# YAML-formatted task output via the built-in default callback. (The old
# community.general.yaml callback was removed in community.general 12.)
stdout_callback = default
callback_result_format = yaml
interpreter_python = /usr/bin/python3

[ssh_connection]
# accept-new lets the first deploy connect without a pre-seeded known_hosts entry.
ssh_args = -o StrictHostKeyChecking=accept-new -o ControlMaster=auto -o ControlPersist=60s
pipelining = True
