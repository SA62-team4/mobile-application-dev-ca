# @author Tiong Zhong Cheng
---
# Image coordinates. app_image_tag is overridden per deploy (the commit SHA).
app_image_prefix: ghcr.io/sa62-team4
app_image_tag: latest
app_spring_image: "{{ app_image_prefix }}/wellness-spring-backend:{{ app_image_tag }}"
app_python_image: "{{ app_image_prefix }}/wellness-python-ai-service:{{ app_image_tag }}"

# Compose overlays applied on the droplet (prod = internal-only + Caddy TLS).
app_compose_files:
  - docker-compose.yml
  - docker-compose.prod.yml

# Same overlays as CLI flags for the `docker compose ... exec` tasks.
app_compose_file_flags: "-f docker-compose.yml -f docker-compose.prod.yml"

# Models that must be present before the first mobile AI request.
# Generation uses qwen2.5:1.5b: same latency class as llama3.2:1b on CPU but
# better instruction-following, and it fits the Ollama mem_limit comfortably.
# To step up quality at ~2-3x the latency, switch to llama3.2:3b here and in
# OLLAMA_GENERATION_MODEL (and raise the ollama mem_limit in the prod overlay).
app_ollama_models:
  - qwen2.5:1.5b
  - nomic-embed-text:latest

# Generation model to warm up (load into memory) at the end of a deploy so the
# first user request is fast. Keep in sync with OLLAMA_GENERATION_MODEL.
app_ollama_warmup_model: qwen2.5:1.5b

# Files shipped from the repo checkout to the droplet.
app_compose_assets:
  - docker-compose.yml
  - docker-compose.prod.yml
  - Caddyfile
