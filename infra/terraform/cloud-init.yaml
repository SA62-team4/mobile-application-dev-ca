#cloud-config
# @author Tiong Zhong Cheng
# Minimal bootstrap so Ansible can take over. Creates the 'deploy' user with the
# SSH key and installs Python; Docker, /opt/wellness, and the app stack are all
# managed by the Ansible playbooks in infra/ansible/. No secrets.
# Rendered by Terraform templatefile(); ssh_public_key is a template variable.

package_update: true
package_upgrade: true

packages:
  - python3        # required by Ansible's interpreter
  - git
  - curl
  - ca-certificates

users:
  - default
  - name: deploy
    groups: [sudo]
    shell: /bin/bash
    sudo: ['ALL=(ALL) NOPASSWD:ALL']
    ssh_authorized_keys:
      - ${ssh_public_key}

write_files:
  - path: /etc/wellness.note
    permissions: '0644'
    content: |
      Wellness App droplet.
      Docker, /opt/wellness, and the stack are configured by Ansible
      (infra/ansible/) from the GitHub Actions deploy job.
      Secrets are written to /opt/wellness/.env by Ansible at deploy time.
      Never store secrets in this image or in cloud-init.

runcmd:
  # Signal that cloud-init finished; Ansible bootstrap installs Docker.
  - touch /var/lib/cloud/wellness-bootstrap-complete
