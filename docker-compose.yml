services:

  # MySQL for app data.
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-wellness_app}
      MYSQL_USER: ${MYSQL_USER:-wellness_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change_me}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change_me_root}
    ports:
      # Host port avoids local MySQL clashes.
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      # Persist database files.
      - mysql-data:/var/lib/mysql
    networks:
      - wellness-net
    healthcheck:
      # Gate backend startup on MySQL readiness.
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m

  # Local LLM runtime.
  ollama:
    image: ollama/ollama:latest
    ports:
      - "${OLLAMA_HOST_PORT:-11434}:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - wellness-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          # Room for local model weights.
          memory: 6g

  # RAG chat and recommendation service.
  python-ai-service:
    build:
      context: ./python-ai-service
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_GENERATION_MODEL: ${OLLAMA_GENERATION_MODEL:-llama3.2:1b}
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text:latest}
      CHROMA_PERSIST_DIR: ${CHROMA_PERSIST_DIR:-/data/chroma}
      KNOWLEDGE_BASE_DIR: /app/rag-knowledge-base
      BACKEND_BASE_URL: http://spring-backend:8080
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-replace_with_internal_token}
      # Optional tracing; off by default.
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-wellness-agentic-ai}
      LANGSMITH_ENDPOINT: ${LANGSMITH_ENDPOINT:-https://api.smith.langchain.com}
    ports:
      - "${AI_SERVICE_HOST_PORT:-8000}:8000"
    volumes:
      # Read-only knowledge base.
      - ./rag-knowledge-base:/app/rag-knowledge-base:ro
      # Persist Chroma index.
      - chroma-data:/data/chroma
    networks:
      - wellness-net
    depends_on:
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g

  # Main Android-facing REST API.
  spring-backend:
    build:
      context: ./spring-backend
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:mysql://mysql:3306/wellness_app}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-wellness_user}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-change_me}
      JWT_SECRET: ${JWT_SECRET:-replace_with_a_long_random_secret_at_least_32_chars}
      JWT_EXPIRY_SECONDS: ${JWT_EXPIRY_SECONDS:-86400}
      AI_SERVICE_URL: ${AI_SERVICE_URL:-http://python-ai-service:8000}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-replace_with_internal_token}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    ports:
      - "${SPRING_HOST_PORT:-8080}:8080"
    networks:
      - wellness-net
    depends_on:
      mysql:
        condition: service_healthy
      python-ai-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent",
             "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m

  # MySQL browser for local demo.
  adminer:
    image: adminer:latest
    ports:
      - "${ADMINER_HOST_PORT:-8081}:8080"
    networks:
      - wellness-net
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

# Shared service network.
networks:
  wellness-net:
    driver: bridge

# Persistent service data.
volumes:
  mysql-data:
  ollama-data:
  chroma-data:
